version: 1
disable_existing_loggers: false

formatters:
  plain:
    format: "%(asctime)s %(levelname)-7s [%(name)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: plain
    stream: ext://sys.stderr

loggers:
  discord:
    level: INFO
    handlers: [console]
    propagate: false
  discord.http:
    level: WARNING
  discord.gateway:
    level: WARNING
  nova:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
